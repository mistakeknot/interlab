version: 1
mode: dependency-driven
tier: deep
max_parallel: 3
timeout_per_task: 300

stages:
  - name: "Foundation"
    tasks:
      - id: task-1
        title: "Orchestration package scaffold + beads helpers"
        files: [internal/orchestration/beads.go, internal/orchestration/register.go, cmd/interlab-mcp/main.go]
        depends: []

  - name: "Core Tools"
    tasks:
      - id: task-2
        title: "plan_campaigns types + validation + file conflict detection"
        files: [internal/orchestration/plan.go, internal/orchestration/plan_test.go]
        depends: []
      - id: task-3
        title: "plan_campaigns tool handler with bead creation"
        files: [internal/orchestration/plan.go, internal/orchestration/register.go]
        depends: [task-2]
      - id: task-4
        title: "dispatch_campaigns tool"
        files: [internal/orchestration/dispatch.go, internal/orchestration/beads.go]
        depends: [task-3]
      - id: task-5
        title: "status_campaigns tool"
        files: [internal/orchestration/status.go]
        depends: [task-3]
      - id: task-6
        title: "synthesize_campaigns tool"
        files: [internal/orchestration/synthesize.go]
        depends: [task-5]

  - name: "Integration"
    tasks:
      - id: task-7
        title: "Orchestration integration tests"
        files: [internal/orchestration/integration_test.go]
        depends: []
      - id: task-8
        title: "Register all tools + rebuild binary"
        files: [internal/orchestration/register.go]
        depends: [task-4, task-5, task-6]
        tier: fast

  - name: "Skill + Docs"
    tasks:
      - id: task-9
        title: "/autoresearch-multi skill protocol"
        files: [skills/autoresearch-multi/SKILL.md, .claude-plugin/plugin.json]
        depends: []
      - id: task-10
        title: "Structural tests + AGENTS.md documentation"
        files: [tests/structural/test_structure.py, AGENTS.md]
        depends: [task-8, task-9]
        tier: fast
